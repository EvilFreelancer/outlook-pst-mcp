# Cross-platform CLI binaries on SemVer tags; assets attach to the matching GitHub Release.

name: Release binaries

on:
  workflow_call:
    inputs:
      tag:
        description: SemVer git tag to build (X.Y.Z)
        required: true
        type: string
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: SemVer git tag to build (X.Y.Z); empty = latest SemVer tag
        required: false
        type: string

defaults:
  run:
    shell: bash

jobs:
  release-binaries:
    name: Build and publish release assets
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag != '' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Resolve release tag
        id: git_tag
        run: |
          set -euo pipefail
          git fetch --tags origin

          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          elif [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="$({ git tag -l | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' || true; } | sort -V | tail -1)"
            if [ -z "$TAG" ]; then
              echo "No SemVer git tags (X.Y.Z) on origin." >&2
              git tag -l >&2 || true
              exit 1
            fi
            git checkout --force "$TAG"
          fi

          if [[ ! "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must match X.Y.Z (got ${TAG})." >&2
            exit 1
          fi

          echo "Building commit $(git rev-parse --short HEAD) at ${TAG}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Ensure tag is on main
        id: gate
        run: |
          set -euo pipefail
          TAG="${{ steps.git_tag.outputs.tag }}"
          git fetch origin main --tags
          TAG_SHA="$(git rev-parse "${TAG}^{commit}")"
          if git merge-base --is-ancestor "$TAG_SHA" origin/main; then
            echo "Tag ${TAG} is on main."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag ${TAG} (${TAG_SHA}) is not on branch main; skipping binary release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install cross-compilers
        if: steps.gate.outputs.skip != 'true'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu gcc-mingw-w64-x86-64 zip

      - name: Cross-compile release binaries
        if: steps.gate.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.git_tag.outputs.tag }}
        run: |
          set -euo pipefail
          DIST="${GITHUB_WORKSPACE}/dist"
          rm -rf "$DIST"
          mkdir -p "$DIST"

          build_target() {
            local GOOS="$1"
            local GOARCH="$2"
            local cc="$3"
            local stem="outlook-pst-mcp_${VERSION}_${GOOS}_${GOARCH}"
            local bindir="$DIST/_staging/${stem}"
            local binname="outlook-pst-mcp"
            if [ "$GOOS" = "windows" ]; then
              binname="outlook-pst-mcp.exe"
            fi

            mkdir -p "$bindir"
            GOOS="$GOOS" GOARCH="$GOARCH" CGO_ENABLED=1 CC="$cc" \
              go build \
              -buildvcs=false \
              -trimpath \
              -ldflags "-s -w" \
              -o "$bindir/$binname" \
              ./cmd/outlook-pst-mcp

            if [ "$GOOS" = "windows" ]; then
              (cd "$bindir" && zip -q "$DIST/${stem}.zip" "$binname")
            else
              tar -C "$bindir" -czf "$DIST/${stem}.tar.gz" "$binname"
            fi
          }

          build_target linux amd64 gcc
          build_target linux arm64 aarch64-linux-gnu-gcc
          build_target windows amd64 x86_64-w64-mingw32-gcc

          rm -rf "$DIST/_staging"
          (cd "$DIST" && sha256sum outlook-pst-mcp_*.tar.gz outlook-pst-mcp_*.zip > SHA256SUMS)
          ls -la "$DIST"

      - name: Upload assets to GitHub Release
        if: steps.gate.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.git_tag.outputs.tag }}
          name: ${{ steps.git_tag.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
