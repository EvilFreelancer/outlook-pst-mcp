# Run project verification on pull requests.

name: Tests on PR

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  verify:
    name: Project verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run checks
        run: make check

      - name: Run tests
        run: make test

      - name: Build binary
        run: make build
